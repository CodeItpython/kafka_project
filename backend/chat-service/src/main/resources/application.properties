server.port=8892
# Graceful shutdown so in-flight WebSocket/HTTP work drains before the pod dies.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SPRING_SHUTDOWN_TIMEOUT:30s}

spring.application.name=chat-service

# chat-service owns its own relational database (DB-per-service). auth-service keeps users.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kafka_chat}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kafka}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kafka}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:15}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/kafka_chat}
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:chat-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.kafka.chat
spring.kafka.consumer.properties.spring.json.value.default.type=com.kafka.chat.dto.ChatMessageEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
# Durable, exactly-once-per-partition publishing so the transactional outbox is
# not undermined by leader-failover loss or retry-induced duplicates.
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.retries=${SPRING_KAFKA_PRODUCER_RETRIES:5}
spring.kafka.producer.properties.delivery.timeout.ms=${SPRING_KAFKA_DELIVERY_TIMEOUT_MS:120000}
spring.kafka.listener.concurrency=${SPRING_KAFKA_LISTENER_CONCURRENCY:3}


# Shared HS256 secret minted by auth-service; chat-service only verifies tokens.
app.jwt.secret=${JWT_SECRET:local-dev-secret-change-me-local-dev-secret}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8880,http://127.0.0.1:8880}

# Service-to-service boundary: chat-service calls auth-service for user data + audit.
app.services.auth-service.url=${APP_SERVICES_AUTH_SERVICE_URL:http://localhost:8890}
app.internal.api-token=${APP_INTERNAL_API_TOKEN:local-dev-internal-token-change-me}

app.chat.topic=chat-messages
app.chat.retry.max-attempts=${APP_CHAT_RETRY_MAX_ATTEMPTS:3}
app.chat.retry.backoff-ms=${APP_CHAT_RETRY_BACKOFF_MS:2000}
app.chat.retry.backoff-multiplier=${APP_CHAT_RETRY_BACKOFF_MULTIPLIER:2.0}
app.chat.dlt.topic=${APP_CHAT_DLT_TOPIC:chat-messages-dlt}
app.outbox.relay.enabled=${APP_OUTBOX_RELAY_ENABLED:true}
app.outbox.relay.fixed-delay-ms=${APP_OUTBOX_RELAY_FIXED_DELAY_MS:1000}
app.outbox.relay.initial-delay-ms=${APP_OUTBOX_RELAY_INITIAL_DELAY_MS:1000}
app.outbox.relay.batch-size=${APP_OUTBOX_RELAY_BATCH_SIZE:20}
app.outbox.relay.max-attempts=${APP_OUTBOX_RELAY_MAX_ATTEMPTS:10}
app.outbox.relay.send-timeout-ms=${APP_OUTBOX_RELAY_SEND_TIMEOUT_MS:5000}
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5.2}
app.openai.responses-url=${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
app.push.fcm.enabled=${APP_PUSH_FCM_ENABLED:false}
app.push.fcm.project-id=${APP_PUSH_FCM_PROJECT_ID:}
app.push.fcm.service-account-json=${APP_PUSH_FCM_SERVICE_ACCOUNT_JSON:}
app.push.fcm.service-account-path=${APP_PUSH_FCM_SERVICE_ACCOUNT_PATH:}
app.push.fcm.dry-run=${APP_PUSH_FCM_DRY_RUN:false}
app.push.fcm.web-push-link=${APP_PUSH_FCM_WEB_PUSH_LINK:http://localhost:8880}
app.push.fcm.web-push-icon=${APP_PUSH_FCM_WEB_PUSH_ICON:}
app.chat.attachments.path=${CHAT_ATTACHMENTS_PATH:uploads/chat}
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.local.root-path=${APP_STORAGE_LOCAL_ROOT:uploads}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:us-east-1}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:kafka-talk-files}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:kafka-talk}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:kafka-talk-secret}
app.storage.s3.path-style-access=${APP_STORAGE_S3_PATH_STYLE_ACCESS:true}
# Shared with auth-service so profile-image URLs signed here validate there.
app.storage.signing.secret=${APP_STORAGE_SIGNING_SECRET:local-dev-storage-signing-secret-change-me}
app.storage.signing.ttl=${APP_STORAGE_SIGNING_TTL:12h}
app.logstash.host=${LOGSTASH_HOST:localhost}
app.logstash.port=${LOGSTASH_PORT:5001}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
