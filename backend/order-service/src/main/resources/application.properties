server.port=8895
# Graceful shutdown so in-flight checkouts drain before the pod dies.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SPRING_SHUTDOWN_TIMEOUT:30s}

spring.application.name=order-service

# order-service owns its own relational database (DB-per-service).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kafka_order}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kafka}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kafka}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:10}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

# Shared with auth-service so order-service verifies the same tokens (verify-only).
app.jwt.secret=${JWT_SECRET:local-dev-secret-change-me-local-dev-secret}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8880,http://127.0.0.1:8880}
# shopping-service backs the authoritative cart read/clear at checkout (Feign).
app.services.shopping-service.url=${APP_SERVICES_SHOPPING_SERVICE_URL:http://localhost:8893}
app.logstash.host=${LOGSTASH_HOST:localhost}
app.logstash.port=${LOGSTASH_PORT:5000}
