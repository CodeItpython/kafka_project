server.port=8893
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SPRING_SHUTDOWN_TIMEOUT:30s}

spring.application.name=shopping-service

# shopping-service owns its own relational database (DB-per-service).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kafka_shopping}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kafka}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kafka}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MIN_IDLE:3}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}


# Shared HS256 secret minted by auth-service; shopping-service only verifies tokens.
app.jwt.secret=${JWT_SECRET:local-dev-secret-change-me-local-dev-secret}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8880,http://127.0.0.1:8880}

# Naver 검색(쇼핑) API. Secret은 서버에서만 헤더로 사용 — 프론트/깃 노출 금지.
app.naver.base-url=${NAVER_BASE_URL:https://openapi.naver.com}
app.naver.client-id=${NAVER_CLIENT_ID:}
app.naver.client-secret=${NAVER_CLIENT_SECRET:}
app.naver.cache-ttl-seconds=${NAVER_CACHE_TTL_SECONDS:300}

# Elasticsearch — 상품 검색 색인(shopping-products) + 검색어 로그(shopping-searches).
# ES가 없거나 잠시 죽어도 서비스는 기동되고, 검색은 Naver로 폴백한다.
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.connection-timeout=${SPRING_ELASTICSEARCH_CONNECTION_TIMEOUT:3s}
spring.elasticsearch.socket-timeout=${SPRING_ELASTICSEARCH_SOCKET_TIMEOUT:5s}
# ES 장애가 서비스 헬스(=readiness)를 끌어내리지 않도록 헬스 기여자는 끈다.
management.health.elasticsearch.enabled=false

# Spring Batch — 카탈로그 ES 색인 잡. Boot가 시작 시 잡을 자동 실행하지 않도록 끄고(직접 런처로 실행),
# JobRepository 메타테이블은 자동 생성한다(kafka_shopping DB).
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# 검색/인기검색어 설정.
app.search.popular-window-hours=${SEARCH_POPULAR_WINDOW_HOURS:24}
app.search.popular-size=${SEARCH_POPULAR_SIZE:10}
app.search.popular-cache-seconds=${SEARCH_POPULAR_CACHE_SECONDS:30}
app.search.warm-on-startup=${SEARCH_WARM_ON_STARTUP:true}
app.search.warm-interval-minutes=${SEARCH_WARM_INTERVAL_MINUTES:30}

app.logstash.host=${LOGSTASH_HOST:localhost}
app.logstash.port=${LOGSTASH_PORT:5001}
