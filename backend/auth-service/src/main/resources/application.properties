server.port=8890

spring.application.name=auth-service
spring.datasource.url=jdbc:h2:mem:authdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}

app.jwt.secret=${JWT_SECRET:local-dev-secret-change-me-local-dev-secret}
app.jwt.issuer=kafka-auth-service
app.jwt.expiration-minutes=60
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8880,http://127.0.0.1:8880}
app.kakao.client-id=${KAKAO_CLIENT_ID:}
app.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
app.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:8890/oauth2/callback/kakao}
