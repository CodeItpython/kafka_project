server.port=8890

spring.application.name=auth-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kafka_project}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kafka}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kafka}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/kafka_chat}
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:http://localhost:9200}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID:chat-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.kafka.auth.chat
spring.kafka.consumer.properties.spring.json.value.default.type=com.kafka.auth.chat.dto.ChatMessageEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}

app.jwt.secret=${JWT_SECRET:local-dev-secret-change-me-local-dev-secret}
app.jwt.issuer=kafka-auth-service
app.jwt.expiration-minutes=60
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8880,http://127.0.0.1:8880}
app.kakao.client-id=${KAKAO_CLIENT_ID:}
app.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
app.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:8890/oauth2/callback/kakao}
app.frontend.redirect-uri=${APP_FRONTEND_REDIRECT_URI:http://localhost:8880}
app.chat.topic=chat-messages
app.chat.retry.max-attempts=${APP_CHAT_RETRY_MAX_ATTEMPTS:3}
app.chat.retry.backoff-ms=${APP_CHAT_RETRY_BACKOFF_MS:2000}
app.chat.retry.backoff-multiplier=${APP_CHAT_RETRY_BACKOFF_MULTIPLIER:2.0}
app.chat.dlt.topic=${APP_CHAT_DLT_TOPIC:chat-messages-dlt}
app.outbox.relay.enabled=${APP_OUTBOX_RELAY_ENABLED:true}
app.outbox.relay.fixed-delay-ms=${APP_OUTBOX_RELAY_FIXED_DELAY_MS:1000}
app.outbox.relay.initial-delay-ms=${APP_OUTBOX_RELAY_INITIAL_DELAY_MS:1000}
app.outbox.relay.batch-size=${APP_OUTBOX_RELAY_BATCH_SIZE:20}
app.outbox.relay.max-attempts=${APP_OUTBOX_RELAY_MAX_ATTEMPTS:10}
app.outbox.relay.send-timeout-ms=${APP_OUTBOX_RELAY_SEND_TIMEOUT_MS:5000}
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5.2}
app.openai.responses-url=${OPENAI_RESPONSES_URL:https://api.openai.com/v1/responses}
app.push.fcm.enabled=${APP_PUSH_FCM_ENABLED:false}
app.push.fcm.project-id=${APP_PUSH_FCM_PROJECT_ID:}
app.push.fcm.service-account-json=${APP_PUSH_FCM_SERVICE_ACCOUNT_JSON:}
app.push.fcm.service-account-path=${APP_PUSH_FCM_SERVICE_ACCOUNT_PATH:}
app.push.fcm.dry-run=${APP_PUSH_FCM_DRY_RUN:false}
app.push.fcm.web-push-link=${APP_PUSH_FCM_WEB_PUSH_LINK:http://localhost:8880}
app.push.fcm.web-push-icon=${APP_PUSH_FCM_WEB_PUSH_ICON:}
app.chat.attachments.path=${CHAT_ATTACHMENTS_PATH:uploads/chat}
app.profile.images.path=${PROFILE_IMAGES_PATH:uploads/profiles}
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.local.root-path=${APP_STORAGE_LOCAL_ROOT:uploads}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:us-east-1}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:kafka-talk-files}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:kafka-talk}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:kafka-talk-secret}
app.storage.s3.path-style-access=${APP_STORAGE_S3_PATH_STYLE_ACCESS:true}
app.dev.seed-users=${APP_DEV_SEED_USERS:true}
app.logstash.host=${LOGSTASH_HOST:localhost}
app.logstash.port=${LOGSTASH_PORT:5001}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
