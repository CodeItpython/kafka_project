server.port=8890
# Graceful shutdown: stop accepting new requests, then let in-flight ones finish
# (works with the k8s preStop hook + terminationGracePeriodSeconds).
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SPRING_SHUTDOWN_TIMEOUT:30s}

spring.application.name=auth-service
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kafka_project}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:kafka}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:kafka}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAX_POOL_SIZE:15}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
# SMTP is optional (email verification degrades gracefully when unset), so the mail
# health indicator must not drag the whole service to DOWN when no SMTP is configured.
management.health.mail.enabled=false
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_WRITE_TIMEOUT:5000}


app.jwt.secret=${JWT_SECRET:local-dev-secret-change-me-local-dev-secret}
app.jwt.issuer=kafka-auth-service
app.jwt.expiration-minutes=60
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8880,http://127.0.0.1:8880}
app.kakao.client-id=${KAKAO_CLIENT_ID:}
app.kakao.client-secret=${KAKAO_CLIENT_SECRET:}
app.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:8890/oauth2/callback/kakao}
# 네이버 아이디로 로그인(검색 API 자격증명과 별개일 수 있어 전용 변수 사용).
app.naver-login.client-id=${NAVER_LOGIN_CLIENT_ID:}
app.naver-login.client-secret=${NAVER_LOGIN_CLIENT_SECRET:}
app.naver-login.redirect-uri=${NAVER_LOGIN_REDIRECT_URI:http://localhost:8890/oauth2/callback/naver}
app.frontend.redirect-uri=${APP_FRONTEND_REDIRECT_URI:http://localhost:8880}
app.email.verification.from=${APP_EMAIL_VERIFICATION_FROM:}
app.email.verification.subject=${APP_EMAIL_VERIFICATION_SUBJECT:[Kafka Talk] 이메일 인증코드}
app.email.verification.app-name=${APP_EMAIL_VERIFICATION_APP_NAME:Kafka Talk}
app.email.verification.ttl=${APP_EMAIL_VERIFICATION_TTL:5m}
app.email.verification.resend-cooldown=${APP_EMAIL_VERIFICATION_RESEND_COOLDOWN:60s}
app.email.verification.max-verify-attempts=${APP_EMAIL_VERIFICATION_MAX_VERIFY_ATTEMPTS:5}
app.email.verification.verify-attempt-window=${APP_EMAIL_VERIFICATION_VERIFY_ATTEMPT_WINDOW:10m}
app.profile.images.path=${PROFILE_IMAGES_PATH:uploads/profiles}
# Shared secret guarding /api/internal/** (service-to-service calls from chat-service).
app.internal.api-token=${APP_INTERNAL_API_TOKEN:local-dev-internal-token-change-me}
app.storage.type=${APP_STORAGE_TYPE:local}
app.storage.local.root-path=${APP_STORAGE_LOCAL_ROOT:uploads}
app.storage.s3.endpoint=${APP_STORAGE_S3_ENDPOINT:}
app.storage.s3.region=${APP_STORAGE_S3_REGION:us-east-1}
app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:kafka-talk-files}
app.storage.s3.access-key=${APP_STORAGE_S3_ACCESS_KEY:kafka-talk}
app.storage.s3.secret-key=${APP_STORAGE_S3_SECRET_KEY:kafka-talk-secret}
app.storage.s3.path-style-access=${APP_STORAGE_S3_PATH_STYLE_ACCESS:true}
app.storage.signing.secret=${APP_STORAGE_SIGNING_SECRET:local-dev-storage-signing-secret-change-me}
app.storage.signing.ttl=${APP_STORAGE_SIGNING_TTL:12h}
app.dev.seed-users=${APP_DEV_SEED_USERS:true}
app.logstash.host=${LOGSTASH_HOST:localhost}
app.logstash.port=${LOGSTASH_PORT:5001}
app.security.rate-limit.enabled=${APP_SECURITY_RATE_LIMIT_ENABLED:true}
app.security.rate-limit.window=${APP_SECURITY_RATE_LIMIT_WINDOW:60s}
app.security.rate-limit.auth-limit=${APP_SECURITY_RATE_LIMIT_AUTH_LIMIT:20}
app.security.rate-limit.api-limit=${APP_SECURITY_RATE_LIMIT_API_LIMIT:600}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
