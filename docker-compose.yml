services:
  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    image: kafka-auth-service:local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8890:8890"
    environment:
      SPRING_PROFILES_ACTIVE: logstash
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8880,http://127.0.0.1:8880
      JWT_SECRET: local-compose-secret-change-me-local-compose-secret
      APP_INTERNAL_API_TOKEN: local-compose-internal-token-change-me
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://localhost:8890/oauth2/callback/kakao}
      # 네이버 아이디로 로그인 — .env 또는 셸 환경변수로 주입(깃 커밋 금지).
      NAVER_LOGIN_CLIENT_ID: ${NAVER_LOGIN_CLIENT_ID:-}
      NAVER_LOGIN_CLIENT_SECRET: ${NAVER_LOGIN_CLIENT_SECRET:-}
      NAVER_LOGIN_REDIRECT_URI: ${NAVER_LOGIN_REDIRECT_URI:-http://localhost:8890/oauth2/callback/naver}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_RESPONSES_URL: ${OPENAI_RESPONSES_URL:-https://api.openai.com/v1/responses}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-true}
      SPRING_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:-true}
      SPRING_MAIL_SMTP_STARTTLS_REQUIRED: ${SPRING_MAIL_SMTP_STARTTLS_REQUIRED:-true}
      APP_EMAIL_VERIFICATION_FROM: ${APP_EMAIL_VERIFICATION_FROM:-}
      APP_EMAIL_VERIFICATION_SUBJECT: ${APP_EMAIL_VERIFICATION_SUBJECT:-[Kafka Talk] 이메일 인증코드}
      APP_EMAIL_VERIFICATION_RESEND_COOLDOWN: ${APP_EMAIL_VERIFICATION_RESEND_COOLDOWN:-60s}
      APP_EMAIL_VERIFICATION_MAX_VERIFY_ATTEMPTS: ${APP_EMAIL_VERIFICATION_MAX_VERIFY_ATTEMPTS:-5}
      APP_EMAIL_VERIFICATION_VERIFY_ATTEMPT_WINDOW: ${APP_EMAIL_VERIFICATION_VERIFY_ATTEMPT_WINDOW:-10m}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kafka_project
      SPRING_DATASOURCE_USERNAME: kafka
      SPRING_DATASOURCE_PASSWORD: kafka
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_STORAGE_TYPE: s3
      APP_STORAGE_S3_ENDPOINT: http://minio:9000
      APP_STORAGE_S3_REGION: us-east-1
      APP_STORAGE_S3_BUCKET: kafka-talk-files
      APP_STORAGE_S3_ACCESS_KEY: kafka-talk
      APP_STORAGE_S3_SECRET_KEY: kafka-talk-secret
      APP_STORAGE_S3_PATH_STYLE_ACCESS: "true"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: 1.0
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000

  news-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: news-service
        # 컨테이너 헬스체크가 쓰는 포트(기본 8890)를 news 실제 포트(8891)에 맞춘다.
        APP_PORT: "8891"
    image: kafka-news-service:local
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8891:8891"
    environment:
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8880,http://127.0.0.1:8880
      NEWS_CACHE_TTL_SECONDS: ${NEWS_CACHE_TTL_SECONDS:-180}
      # 기사 색인 + 연관검색어(significant_text)용. ES가 없어도 피드/검색은 Naver로 동작.
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # 네이버 검색 API 자격증명(쇼핑과 동일 값 재사용) — .env로 주입, 깃 커밋 금지.
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}

  chat-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: chat-service
        APP_PORT: "8892"
    image: kafka-chat-service:local
    depends_on:
      auth-service:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8892:8892"
    environment:
      SPRING_PROFILES_ACTIVE: logstash
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8880,http://127.0.0.1:8880
      JWT_SECRET: local-compose-secret-change-me-local-compose-secret
      APP_INTERNAL_API_TOKEN: local-compose-internal-token-change-me
      APP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8890
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kafka_chat
      SPRING_DATASOURCE_USERNAME: kafka
      SPRING_DATASOURCE_PASSWORD: kafka
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/kafka_chat
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_RESPONSES_URL: ${OPENAI_RESPONSES_URL:-https://api.openai.com/v1/responses}
      APP_STORAGE_TYPE: s3
      APP_STORAGE_S3_ENDPOINT: http://minio:9000
      APP_STORAGE_S3_REGION: us-east-1
      APP_STORAGE_S3_BUCKET: kafka-talk-files
      APP_STORAGE_S3_ACCESS_KEY: kafka-talk
      APP_STORAGE_S3_SECRET_KEY: kafka-talk-secret
      APP_STORAGE_S3_PATH_STYLE_ACCESS: "true"
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: 1.0
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000

  shopping-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: shopping-service
        APP_PORT: "8893"
    image: kafka-shopping-service:local
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8893:8893"
    environment:
      SPRING_PROFILES_ACTIVE: logstash
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8880,http://127.0.0.1:8880
      JWT_SECRET: local-compose-secret-change-me-local-compose-secret
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kafka_shopping
      SPRING_DATASOURCE_USERNAME: kafka
      SPRING_DATASOURCE_PASSWORD: kafka
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # 네이버 검색(쇼핑) API 자격증명 — .env 또는 셸 환경변수로 주입(깃 커밋 금지).
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: 1.0
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://tempo:4318/v1/traces
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: kafka-frontend:local
    # 로컬 개발은 vite dev 서버(npm run dev, :8880 HMR)로 돌린다. 기본 `docker compose up`이
    # 프론트 컨테이너를 되살리지 않도록 프로파일로 격리. 컨테이너로 띄울 땐:
    #   docker compose --profile container up -d frontend
    profiles: ["container"]
    depends_on:
      - auth-service
      - chat-service
      - shopping-service
      - news-service
    ports:
      - "8880:8880"

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: kafka-jenkins:local
    container_name: kafka-jenkins
    # 로컬 앱 개발엔 불필요(무거운 CI + 매분 git 폴링). 필요할 때만: docker compose --profile ci up -d
    profiles: ["ci"]
    ports:
      - "18081:8080"
      - "50000:50000"
    environment:
      KAFKA_PROJECT_GIT_URL: ${KAFKA_PROJECT_GIT_URL:-https://github.com/CodeItpython/kafka_project}
      KAFKA_PROJECT_CI_BRANCH: ${KAFKA_PROJECT_CI_BRANCH:-*/main}
      KAFKA_PROJECT_DEPLOY_BRANCH: ${KAFKA_PROJECT_DEPLOY_BRANCH:-*/main}
      KAFKA_PROJECT_MAIN_BRANCH: ${KAFKA_PROJECT_MAIN_BRANCH:-*/main}
      KAFKA_PROJECT_POLL_SCM: ${KAFKA_PROJECT_POLL_SCM:-* * * * *}
    volumes:
      - jenkins-data:/var/jenkins_home
      - ./jenkins/init.groovy.d:/var/jenkins_home/init.groovy.d:ro

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-local
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: kafka-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kafka_project
      POSTGRES_USER: kafka
      POSTGRES_PASSWORD: kafka
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Creates the chat-service database on first init (empty volume only).
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kafka -d kafka_project"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mongodb:
    image: mongo:7
    container_name: kafka-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping')\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: kafka-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: kafka-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: kafka-talk
      MINIO_ROOT_PASSWORD: kafka-talk-secret
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local >/dev/null 2>&1 || curl -sf http://localhost:9000/minio/health/live >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  elasticsearch:
    # 한국어 형태소 분석기(nori)를 포함한 커스텀 이미지 — 연관검색어(significant_text)/검색 품질용.
    build:
      context: ./elasticsearch
      dockerfile: Dockerfile
    image: kafka-elasticsearch:local
    container_name: kafka-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 45s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.5
    container_name: kafka-logstash
    profiles: ["observability"]
    depends_on:
      - elasticsearch
    ports:
      - "5001:5000"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: -Xms256m -Xmx256m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.5
    container_name: kafka-kibana
    profiles: ["observability"]
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: kafka-prometheus
    profiles: ["observability"]
    depends_on:
      - auth-service
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  tempo:
    image: grafana/tempo:2.6.1
    container_name: kafka-tempo
    profiles: ["observability"]
    # tempo 이미지는 non-root(uid 10001)로 도는데, named volume(/tmp/tempo)이
    # root 소유라 wal/blocks 디렉터리 생성이 거부됨(permission denied). 로컬 개발용으로
    # root로 실행해 볼륨에 쓰기 가능하게 한다.
    user: "0:0"
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo

  grafana:
    image: grafana/grafana:11.3.0
    container_name: kafka-grafana
    profiles: ["observability"]
    depends_on:
      - prometheus
      - tempo
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  kafka-data:
  postgres-data:
  mongodb-data:
  redis-data:
  minio-data:
  elasticsearch-data:
  jenkins-data:
  tempo-data:
  grafana-data:
