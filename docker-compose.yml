services:
  discovery-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: discovery-service
    image: kafka-discovery-service:local
    ports:
      - "8761:8761"

  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    image: kafka-auth-service:local
    depends_on:
      - discovery-service
      - kafka
    ports:
      - "8890:8890"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8880,http://127.0.0.1:8880
      JWT_SECRET: local-compose-secret-change-me-local-compose-secret

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: kafka-frontend:local
    depends_on:
      - auth-service
    ports:
      - "8880:8880"

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-local
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
