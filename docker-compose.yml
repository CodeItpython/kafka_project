services:
  discovery-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: discovery-service
    image: kafka-discovery-service:local
    ports:
      - "8761:8761"

  auth-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    image: kafka-auth-service:local
    depends_on:
      - discovery-service
      - kafka
      - postgres
      - mongodb
      - elasticsearch
      - redis
      - logstash
    ports:
      - "8890:8890"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-service:8761/eureka/
      EUREKA_CLIENT_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: logstash
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8880,http://127.0.0.1:8880
      JWT_SECRET: local-compose-secret-change-me-local-compose-secret
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-http://localhost:8890/oauth2/callback/kakao}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kafka_project
      SPRING_DATASOURCE_USERNAME: kafka
      SPRING_DATASOURCE_PASSWORD: kafka
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/kafka_chat
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: kafka-frontend:local
    depends_on:
      - auth-service
    ports:
      - "8880:8880"

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: kafka-jenkins:local
    container_name: kafka-jenkins
    ports:
      - "18081:8080"
      - "50000:50000"
    environment:
      KAFKA_PROJECT_GIT_URL: ${KAFKA_PROJECT_GIT_URL:-https://github.com/CodeItpython/kafka_project}
      KAFKA_PROJECT_CI_BRANCH: ${KAFKA_PROJECT_CI_BRANCH:-*/codex/merge-redis-elk-lombok-to-main}
      KAFKA_PROJECT_MAIN_BRANCH: ${KAFKA_PROJECT_MAIN_BRANCH:-*/main}
      KAFKA_PROJECT_POLL_SCM: ${KAFKA_PROJECT_POLL_SCM:-* * * * *}
    volumes:
      - jenkins-data:/var/jenkins_home
      - ./jenkins/init.groovy.d:/var/jenkins_home/init.groovy.d:ro

  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka-local
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  postgres:
    image: postgres:16-alpine
    container_name: kafka-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kafka_project
      POSTGRES_USER: kafka
      POSTGRES_PASSWORD: kafka
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: kafka-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

  redis:
    image: redis:7.4-alpine
    container_name: kafka-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.5
    container_name: kafka-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.5
    container_name: kafka-logstash
    depends_on:
      - elasticsearch
    ports:
      - "5001:5000"
      - "9600:9600"
    environment:
      LS_JAVA_OPTS: -Xms256m -Xmx256m
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.5
    container_name: kafka-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200

volumes:
  postgres-data:
  mongodb-data:
  redis-data:
  elasticsearch-data:
  jenkins-data:
