apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: kafka-project
type: Opaque
stringData:
  jwt-secret: change-this-local-kubernetes-secret-change-this
  # Must match chat-secrets.internal-api-token below.
  internal-api-token: change-this-local-internal-token-change-this
  smtp-host: ""
  smtp-port: "587"
  smtp-username: ""
  smtp-password: ""
  smtp-auth: "true"
  smtp-starttls-enable: "true"
  smtp-starttls-required: "true"
  email-verification-from: ""
  email-verification-subject: "[Kafka Talk] 이메일 인증코드"
---
apiVersion: v1
kind: Secret
metadata:
  name: chat-secrets
  namespace: kafka-project
type: Opaque
stringData:
  # jwt-secret and internal-api-token MUST match auth-secrets above.
  jwt-secret: change-this-local-kubernetes-secret-change-this
  internal-api-token: change-this-local-internal-token-change-this
  openai-api-key: ""
  fcm-enabled: "false"
  fcm-project-id: ""
  fcm-service-account-json: ""
  fcm-dry-run: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: shopping-secrets
  namespace: kafka-project
type: Opaque
stringData:
  # jwt-secret MUST match auth-secrets above (tokens are minted by auth-service).
  jwt-secret: change-this-local-kubernetes-secret-change-this
  # Naver 검색 API 자격증명 (developers.naver.com에서 발급).
  naver-client-id: ""
  naver-client-secret: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secrets
  namespace: kafka-project
type: Opaque
stringData:
  root-user: kafka-talk
  root-password: kafka-talk-secret
