apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  namespace: kafka-project
type: Opaque
stringData:
  jwt-secret: change-this-local-kubernetes-secret-change-this
  openai-api-key: ""
  smtp-host: ""
  smtp-port: "587"
  smtp-username: ""
  smtp-password: ""
  smtp-auth: "true"
  smtp-starttls-enable: "true"
  smtp-starttls-required: "true"
  email-verification-from: ""
  email-verification-subject: "[Kafka Talk] 로그인 인증번호"
  fcm-enabled: "false"
  fcm-project-id: ""
  fcm-service-account-json: ""
  fcm-dry-run: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secrets
  namespace: kafka-project
type: Opaque
stringData:
  root-user: kafka-talk
  root-password: kafka-talk-secret
