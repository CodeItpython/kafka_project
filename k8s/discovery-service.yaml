apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: kafka-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
        - name: discovery-service
          image: kafka-discovery-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /
              port: 8761
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: kafka-project
spec:
  type: ClusterIP
  selector:
    app: discovery-service
  ports:
    - name: http
      port: 8761
      targetPort: 8761
