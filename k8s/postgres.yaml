apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: kafka-project
spec:
  serviceName: postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        # postgres:16-alpine runs as uid/gid 70; fsGroup lets it write to the PVC.
        fsGroup: 70
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: kafka_project
            - name: POSTGRES_USER
              value: kafka
            - name: POSTGRES_PASSWORD
              value: kafka
            # Keep the actual data one level below the mount so the volume's
            # lost+found dir never collides with PGDATA initialization.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U kafka -d kafka_project"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U kafka -d kafka_project"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # Creates the chat-service database on first init (empty PVC only).
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: kafka-project
data:
  01-create-chat-db.sql: |
    -- DB-per-service: chat-service owns its own relational database on the same
    -- Postgres instance. Runs only on first initialization of an empty data volume.
    CREATE DATABASE kafka_chat OWNER kafka;
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kafka-project
spec:
  # Stable ClusterIP that application clients connect to (`postgres:5432`).
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: kafka-project
spec:
  # Governing headless service required by the StatefulSet for stable pod DNS.
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
