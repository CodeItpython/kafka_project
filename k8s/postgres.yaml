apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kafka-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: kafka_project
            - name: POSTGRES_USER
              value: kafka
            - name: POSTGRES_PASSWORD
              value: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kafka-project
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
