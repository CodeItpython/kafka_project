apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kafka-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: kafka-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8880
          readinessProbe:
            httpGet:
              path: /
              port: 8880
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: kafka-project
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 8880
      targetPort: 8880
      nodePort: 30880
