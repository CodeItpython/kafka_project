apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kafka-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      # Allow in-flight requests / Kafka work to drain on SIGTERM.
      terminationGracePeriodSeconds: 45
      containers:
        - name: auth-service
          image: kafka-auth-service:local
          imagePullPolicy: IfNotPresent
          securityContext:
            # Image runs as the non-root `spring` user; pin the numeric uid/gid so
            # kubelet can verify runAsNonRoot (a non-numeric image USER isn't verifiable).
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8890
          lifecycle:
            preStop:
              # Give kube-proxy time to drop this pod from Service endpoints
              # before the JVM receives SIGTERM, avoiding dropped requests.
              exec:
                command: ["sh", "-c", "sleep 5"]
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: logstash
            - name: APP_CORS_ALLOWED_ORIGINS
              value: http://localhost:8880,http://127.0.0.1:8880
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: jwt-secret
            # Shared secret guarding /api/internal/** (chat-service → auth-service calls).
            - name: APP_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: internal-api-token
            - name: SPRING_MAIL_HOST
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: smtp-host
                  optional: true
            - name: SPRING_MAIL_PORT
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: smtp-port
                  optional: true
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: smtp-username
                  optional: true
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: smtp-password
                  optional: true
            - name: SPRING_MAIL_SMTP_AUTH
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: smtp-auth
                  optional: true
            - name: SPRING_MAIL_SMTP_STARTTLS_ENABLE
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: smtp-starttls-enable
                  optional: true
            - name: SPRING_MAIL_SMTP_STARTTLS_REQUIRED
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: smtp-starttls-required
                  optional: true
            - name: APP_EMAIL_VERIFICATION_FROM
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: email-verification-from
                  optional: true
            - name: APP_EMAIL_VERIFICATION_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: email-verification-subject
                  optional: true
            - name: APP_EMAIL_VERIFICATION_RESEND_COOLDOWN
              value: "60s"
            - name: APP_EMAIL_VERIFICATION_MAX_VERIFY_ATTEMPTS
              value: "5"
            - name: APP_EMAIL_VERIFICATION_VERIFY_ATTEMPT_WINDOW
              value: "10m"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/kafka_project
            - name: SPRING_DATASOURCE_USERNAME
              value: kafka
            - name: SPRING_DATASOURCE_PASSWORD
              value: kafka
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: APP_STORAGE_TYPE
              value: s3
            - name: APP_STORAGE_S3_ENDPOINT
              value: http://minio:9000
            - name: APP_STORAGE_S3_REGION
              value: us-east-1
            - name: APP_STORAGE_S3_BUCKET
              value: kafka-talk-files
            - name: APP_STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: root-user
            - name: APP_STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: root-password
            - name: APP_STORAGE_S3_PATH_STYLE_ACCESS
              value: "true"
            - name: MANAGEMENT_TRACING_SAMPLING_PROBABILITY
              value: "1.0"
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: http://tempo:4318/v1/traces
            - name: LOGSTASH_HOST
              value: logstash
            - name: LOGSTASH_PORT
              value: "5000"
          # Startup can take a while under load (JPA/Kafka/ES init + Flyway); the
          # startup probe gives it room so liveness doesn't kill a still-booting app.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8890
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 48
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8890
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8890
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kafka-project
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8890
      targetPort: 8890
      nodePort: 30890
