apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: kafka-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: kafka-auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8890
          env:
            - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
              value: http://discovery-service:8761/eureka/
            - name: APP_CORS_ALLOWED_ORIGINS
              value: http://localhost:8880,http://127.0.0.1:8880
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /api/auth/oauth/kakao/guide
              port: 8890
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: kafka-project
spec:
  type: NodePort
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8890
      targetPort: 8890
      nodePort: 30890
